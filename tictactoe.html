<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Tic-Tac-Toe</title>
<style>
  :root {
    --bg: #f3f1ec;
    --panel: #ffffff;
    --ink: #1d222b;
    --muted: #6b7280;
    --line: #d9d5cc;
    --grid: #c7c2b6;
    --x: #e8543f;
    --o: #1d9d97;
    --accent-soft: rgba(232, 84, 63, 0.12);
    --shadow: 0 18px 40px -22px rgba(29, 34, 43, 0.45);
    --focus: #4b6bff;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #12151c;
      --panel: #1a1f29;
      --ink: #eef1f6;
      --muted: #8791a3;
      --line: #2a303c;
      --grid: #2f3644;
      --x: #ff6b5e;
      --o: #3fc8c2;
      --accent-soft: rgba(255, 107, 94, 0.14);
      --shadow: 0 24px 50px -28px rgba(0, 0, 0, 0.8);
      --focus: #7d93ff;
    }
  }
  :root[data-theme="light"] {
    --bg: #f3f1ec; --panel: #ffffff; --ink: #1d222b; --muted: #6b7280;
    --line: #d9d5cc; --grid: #c7c2b6; --x: #e8543f; --o: #1d9d97;
    --accent-soft: rgba(232, 84, 63, 0.12);
    --shadow: 0 18px 40px -22px rgba(29, 34, 43, 0.45); --focus: #4b6bff;
  }
  :root[data-theme="dark"] {
    --bg: #12151c; --panel: #1a1f29; --ink: #eef1f6; --muted: #8791a3;
    --line: #2a303c; --grid: #2f3644; --x: #ff6b5e; --o: #3fc8c2;
    --accent-soft: rgba(255, 107, 94, 0.14);
    --shadow: 0 24px 50px -28px rgba(0, 0, 0, 0.8); --focus: #7d93ff;
  }

  * { box-sizing: border-box; }
  html, body { height: 100%; }
  body {
    margin: 0;
    background: var(--bg);
    color: var(--ink);
    font-family: "Segoe UI", -apple-system, BlinkMacSystemFont, system-ui, sans-serif;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 24px;
    min-height: 100vh;
  }

  .app {
    width: 100%;
    max-width: 380px;
    display: flex;
    flex-direction: column;
    gap: 20px;
  }

  header { text-align: center; }
  h1 {
    margin: 0;
    font-size: 30px;
    font-weight: 800;
    letter-spacing: -0.02em;
  }
  h1 .mark-x { color: var(--x); }
  h1 .mark-o { color: var(--o); }
  .tagline {
    margin: 6px 0 0;
    font-size: 12px;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: var(--muted);
  }

  .status {
    text-align: center;
    font-size: 17px;
    font-weight: 600;
    min-height: 24px;
  }
  .status .who-x { color: var(--x); }
  .status .who-o { color: var(--o); }

  .board {
    position: relative;
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 10px;
    aspect-ratio: 1 / 1;
    background: var(--grid);
    padding: 10px;
    border-radius: 18px;
    box-shadow: var(--shadow);
  }

  .cell {
    border: none;
    background: var(--panel);
    border-radius: 12px;
    font-size: clamp(40px, 14vw, 68px);
    font-weight: 800;
    line-height: 1;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    color: var(--ink);
    transition: transform 0.08s ease, background 0.15s ease;
    -webkit-tap-highlight-color: transparent;
  }
  .cell:hover:not(:disabled) { background: var(--accent-soft); }
  .cell:active:not(:disabled) { transform: scale(0.96); }
  .cell:focus-visible { outline: 3px solid var(--focus); outline-offset: 2px; }
  .cell:disabled { cursor: default; }
  .cell.x { color: var(--x); }
  .cell.o { color: var(--o); }
  .cell .glyph {
    display: inline-block;
    animation: pop 0.18s ease;
  }
  @keyframes pop {
    from { transform: scale(0.4); opacity: 0; }
    to   { transform: scale(1); opacity: 1; }
  }
  .cell.win {
    background: var(--accent-soft);
    box-shadow: inset 0 0 0 2px currentColor;
  }

  .controls {
    display: flex;
    gap: 10px;
    align-items: center;
  }
  .segmented {
    flex: 1;
    display: flex;
    background: var(--panel);
    border-radius: 10px;
    padding: 4px;
    gap: 4px;
    border: 1px solid var(--line);
  }
  .segmented button {
    flex: 1;
    border: none;
    background: transparent;
    color: var(--muted);
    font: inherit;
    font-size: 13px;
    font-weight: 600;
    padding: 8px 6px;
    border-radius: 7px;
    cursor: pointer;
    transition: background 0.15s ease, color 0.15s ease;
  }
  .segmented button[aria-pressed="true"] {
    background: var(--ink);
    color: var(--bg);
  }
  .segmented button:focus-visible { outline: 3px solid var(--focus); outline-offset: 2px; }

  .btn-reset {
    border: 1px solid var(--line);
    background: var(--panel);
    color: var(--ink);
    font: inherit;
    font-size: 13px;
    font-weight: 600;
    padding: 8px 16px;
    border-radius: 10px;
    cursor: pointer;
    transition: transform 0.08s ease;
  }
  .btn-reset:hover { background: var(--accent-soft); }
  .btn-reset:active { transform: scale(0.96); }
  .btn-reset:focus-visible { outline: 3px solid var(--focus); outline-offset: 2px; }

  .scoreboard {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 10px;
    text-align: center;
  }
  .score {
    background: var(--panel);
    border: 1px solid var(--line);
    border-radius: 12px;
    padding: 10px 6px;
  }
  .score .label {
    font-size: 11px;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--muted);
  }
  .score .value {
    font-size: 24px;
    font-weight: 800;
    margin-top: 2px;
    font-variant-numeric: tabular-nums;
  }
  .score.x .value { color: var(--x); }
  .score.o .value { color: var(--o); }

  @media (prefers-reduced-motion: reduce) {
    * { animation: none !important; transition: none !important; }
  }
</style>
</head>
<body>
<div class="app">
  <header>
    <h1><span class="mark-x">Tic</span>-Tac-<span class="mark-o">Toe</span></h1>
    <p class="tagline">Three in a row wins</p>
  </header>

  <div class="status" id="status" aria-live="polite"></div>

  <div class="board" id="board" role="grid" aria-label="Tic-tac-toe board"></div>

  <div class="controls">
    <div class="segmented" role="group" aria-label="Game mode">
      <button id="mode-two" aria-pressed="true">2 Players</button>
      <button id="mode-cpu" aria-pressed="false">vs CPU</button>
    </div>
    <button class="btn-reset" id="reset">New round</button>
  </div>

  <div class="scoreboard">
    <div class="score x">
      <div class="label">X</div>
      <div class="value" id="score-x">0</div>
    </div>
    <div class="score">
      <div class="label">Draws</div>
      <div class="value" id="score-d">0</div>
    </div>
    <div class="score o">
      <div class="label">O</div>
      <div class="value" id="score-o">0</div>
    </div>
  </div>
</div>

<script>
  const WINS = [
    [0,1,2],[3,4,5],[6,7,8],
    [0,3,6],[1,4,7],[2,5,8],
    [0,4,8],[2,4,6]
  ];

  let board, current, over, winLine, vsCpu, scores;

  const boardEl = document.getElementById('board');
  const statusEl = document.getElementById('status');
  const cells = [];

  for (let i = 0; i < 9; i++) {
    const c = document.createElement('button');
    c.className = 'cell';
    c.setAttribute('role', 'gridcell');
    c.dataset.i = i;
    c.addEventListener('click', () => handleMove(i));
    boardEl.appendChild(c);
    cells.push(c);
  }

  function reset(keepScores) {
    board = Array(9).fill('');
    current = 'X';
    over = false;
    winLine = null;
    if (!keepScores) scores = { X: 0, O: 0, D: 0 };
    render();
  }

  function render() {
    cells.forEach((c, i) => {
      const v = board[i];
      c.innerHTML = v ? '<span class="glyph">' + v + '</span>' : '';
      c.className = 'cell' + (v ? ' ' + v.toLowerCase() : '');
      c.disabled = over || v !== '';
      c.setAttribute('aria-label',
        v ? 'Cell ' + (i + 1) + ', ' + v : 'Cell ' + (i + 1) + ', empty');
    });
    if (winLine) {
      winLine.forEach(i => cells[i].classList.add('win'));
    }
    document.getElementById('score-x').textContent = scores.X;
    document.getElementById('score-o').textContent = scores.O;
    document.getElementById('score-d').textContent = scores.D;

    if (over) {
      const w = winner(board);
      statusEl.innerHTML = w
        ? '<span class="who-' + w.toLowerCase() + '">' + w + '</span> wins!'
        : "It's a draw";
    } else {
      const label = vsCpu && current === 'O' ? "CPU's turn" : current + "'s turn";
      statusEl.innerHTML = '<span class="who-' + current.toLowerCase() + '">' + label + '</span>';
    }
  }

  function handleMove(i) {
    if (over || board[i] || (vsCpu && current === 'O')) return;
    place(i);
    if (!over && vsCpu && current === 'O') {
      setTimeout(cpuMove, 260);
    }
  }

  function place(i) {
    board[i] = current;
    const result = evaluate(board);
    if (result.done) {
      over = true;
      winLine = result.line;
      if (result.winner) scores[result.winner]++;
      else scores.D++;
    } else {
      current = current === 'X' ? 'O' : 'X';
    }
    render();
  }

  function cpuMove() {
    if (over) return;
    const i = bestMove(board, 'O');
    place(i);
  }

  function winner(b) {
    for (const [a, c, d] of WINS) {
      if (b[a] && b[a] === b[c] && b[a] === b[d]) return b[a];
    }
    return null;
  }

  function evaluate(b) {
    for (const line of WINS) {
      const [a, c, d] = line;
      if (b[a] && b[a] === b[c] && b[a] === b[d]) {
        return { done: true, winner: b[a], line: line };
      }
    }
    if (b.every(v => v)) return { done: true, winner: null, line: null };
    return { done: false };
  }

  // Minimax — CPU plays O optimally (unbeatable)
  function bestMove(b, player) {
    let best = -Infinity, move = -1;
    for (let i = 0; i < 9; i++) {
      if (!b[i]) {
        b[i] = player;
        const s = minimax(b, false);
        b[i] = '';
        if (s > best) { best = s; move = i; }
      }
    }
    return move;
  }

  function minimax(b, maximizing) {
    const w = winner(b);
    if (w === 'O') return 1;
    if (w === 'X') return -1;
    if (b.every(v => v)) return 0;

    if (maximizing) {
      let best = -Infinity;
      for (let i = 0; i < 9; i++) {
        if (!b[i]) {
          b[i] = 'O';
          best = Math.max(best, minimax(b, false));
          b[i] = '';
        }
      }
      return best;
    } else {
      let best = Infinity;
      for (let i = 0; i < 9; i++) {
        if (!b[i]) {
          b[i] = 'X';
          best = Math.min(best, minimax(b, true));
          b[i] = '';
        }
      }
      return best;
    }
  }

  document.getElementById('reset').addEventListener('click', () => reset(true));

  const modeTwo = document.getElementById('mode-two');
  const modeCpu = document.getElementById('mode-cpu');
  function setMode(cpu) {
    vsCpu = cpu;
    modeTwo.setAttribute('aria-pressed', String(!cpu));
    modeCpu.setAttribute('aria-pressed', String(cpu));
    reset(false);
  }
  modeTwo.addEventListener('click', () => setMode(false));
  modeCpu.addEventListener('click', () => setMode(true));

  vsCpu = false;
  scores = { X: 0, O: 0, D: 0 };
  reset(false);
</script>
</body>
</html>
